name: Release Build

on:
  push:
    branches:
      - tractorgram-changes

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > TMessagesProj/config/release.keystore

      - name: Build release APK
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD }}"
        env:
          GRADLE_OPTS: "-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: TMessagesProj_App/**/app.apk
          retention-days: 30

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "APP_VERSION_NAME" gradle.properties | cut -d= -f2)
          VERSION_CODE=$(grep "APP_VERSION_CODE" gradle.properties | cut -d= -f2)
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}
          name: Release ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})
          files: TMessagesProj_App/**/app.apk
          generate_release_notes: true
